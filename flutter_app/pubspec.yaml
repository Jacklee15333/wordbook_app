name: wordbook_app
description: A vocabulary learning app with FSRS algorithm
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  # HTTP
  dio: ^5.4.0
  # Local storage
  shared_preferences: ^2.2.2
  # UI
  flutter_flip_card: ^0.0.6
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.2
  google_fonts: ^6.1.0
  # Audio
  just_audio: ^0.9.36
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
