<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WordBook - Vocabulary Learning App">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WordBook</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f2f5; overflow: hidden; }

    /* ═══ Loading Screen ═══ */
    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1565C0 0%, #1A73E8 40%, #4C8BF5 100%);
      z-index: 99999;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #loading-screen.done {
      opacity: 0;
      transform: scale(1.02);
      pointer-events: none;
    }

    /* Logo */
    .loading-logo {
      width: 88px; height: 88px;
      background: rgba(255,255,255,0.2);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      animation: logo-breathe 2s ease-in-out infinite;
      backdrop-filter: blur(10px);
    }
    .loading-logo svg {
      width: 48px; height: 48px; fill: white;
    }
    @keyframes logo-breathe {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(255,255,255,0); }
    }

    /* Title */
    .loading-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 28px; font-weight: 800; color: white;
      margin-bottom: 6px; letter-spacing: 1px;
    }
    .loading-subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px; color: rgba(255,255,255,0.7);
      margin-bottom: 48px;
    }

    /* Progress bar */
    .progress-wrapper {
      width: 200px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: white;
      border-radius: 2px;
      animation: progress-flow 3.5s ease-in-out forwards;
    }
    @keyframes progress-flow {
      0%   { width: 0%; }
      15%  { width: 15%; }
      40%  { width: 45%; }
      65%  { width: 65%; }
      85%  { width: 80%; }
      100% { width: 92%; }
    }

    /* Loading text */
    .loading-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    /* Floating word bubbles */
    .word-bubble {
      position: absolute;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: rgba(255,255,255,0.08);
      font-weight: 700;
      animation: float-up linear infinite;
      pointer-events: none;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(15deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <!-- Floating word decorations -->
    <span class="word-bubble" style="left:8%;font-size:18px;animation-duration:8s;animation-delay:0s;">hello</span>
    <span class="word-bubble" style="left:22%;font-size:14px;animation-duration:10s;animation-delay:1s;">vocabulary</span>
    <span class="word-bubble" style="left:42%;font-size:20px;animation-duration:7s;animation-delay:0.5s;">learn</span>
    <span class="word-bubble" style="left:65%;font-size:16px;animation-duration:9s;animation-delay:2s;">remember</span>
    <span class="word-bubble" style="left:80%;font-size:22px;animation-duration:8s;animation-delay:0.3s;">study</span>
    <span class="word-bubble" style="left:35%;font-size:15px;animation-duration:11s;animation-delay:1.5s;">improve</span>
    <span class="word-bubble" style="left:55%;font-size:17px;animation-duration:9s;animation-delay:3s;">English</span>
    <span class="word-bubble" style="left:90%;font-size:13px;animation-duration:10s;animation-delay:2.5s;">knowledge</span>

    <!-- Logo -->
    <div class="loading-logo">
      <svg viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 4h2v5l-1-.75L9 9V4zm9 16H6V4h1v9l3-2.25L13 13V4h5v16z"/></svg>
    </div>

    <!-- Title -->
    <div class="loading-title">单词本</div>
    <div class="loading-subtitle">WordBook</div>

    <!-- Progress -->
    <div class="progress-wrapper">
      <div class="progress-bar"></div>
    </div>
    <div class="loading-text">正在加载...</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var bar = document.querySelector('.progress-bar');
      if (bar) {
        bar.style.animation = 'none';
        bar.style.width = '100%';
        bar.style.transition = 'width 0.3s ease';
      }
      var text = document.querySelector('.loading-text');
      if (text) text.textContent = '加载完成';
      setTimeout(function() {
        var screen = document.getElementById('loading-screen');
        if (screen) {
          screen.classList.add('done');
          setTimeout(function() { screen.remove(); }, 600);
        }
      }, 400);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
